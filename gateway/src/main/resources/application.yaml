server:
  port: 8080

spring:
  application:
    name: gateway
  
  cloud:
    gateway:
        server:
            webflux:
                routes:
                  - id: auth-service
                    uri: http://localhost:8081
                    predicates:
                      - Path=/api/v1/auth/**
                  - id: event-service
                    uri: http://localhost:8082
                    predicates:
                      - Path=/api/v1/events/**
                  - id: profile-service
                    uri: http://localhost:8083
                    predicates:
                      - Path=/api/v1/profiles/**
        
jwt:
    key: my-super-secret-test-key-for-jwt